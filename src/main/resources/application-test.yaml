spring:
  datasource:
    driver-class-name: org.h2.Driver
    password: ''
    url: jdbc:h2:file:./data
    username: sa
  h2:
    console:
      enabled: true
      path: /h2
  jpa:
    hibernate:
      ddl-auto: update
  # Migrations do Flyway são específicas de Postgres — nos testes (H2) o
  # schema continua gerenciado pelo Hibernate direto.
  flyway:
    enabled: false
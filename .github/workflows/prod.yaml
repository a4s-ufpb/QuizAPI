name: Release - Version, Docker Image and Push

on:
  push:
    branches: [main]

# Permite criar/enviar a tag de versão de volta ao repositório.
permissions:
  contents: write

jobs:
  build-and-push:
    name: Build, Tag and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      # Versão semver monotônica: 1.0.<nº da execução do workflow>.
      - name: Resolve version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build and test
        run: mvn -B verify

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (version + latest)
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/quizapi:${{ steps.version.outputs.version }} \
            -t ${{ secrets.DOCKER_USERNAME }}/quizapi:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/quizapi --all-tags

      # Cria a tag de versão no GitHub (idempotente: não falha se já existir).
      - name: Create GitHub version tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG já existe — pulando."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

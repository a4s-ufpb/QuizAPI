services:

  db:
    container_name: container-database-quiz
    image: postgres:17
    restart: always
    env_file:
      - dev.env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/app/data
    networks:
      - quiz-network

  quiz-api:
    container_name: container-quiz-api
    depends_on:
      - db
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - dev.env
    ports:
      - "8080:8080"
    networks:
      - quiz-network

  pgadmin:
    container_name: container-pgadmin-quiz
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - quiz-network

volumes:
  db_data: {}

networks:
  quiz-network:
    name: quiz-network
    driver: bridge